<h2>All Tickets (Manager Dashboard)</h2>

<table border="1" cellpadding="8">
<tr>
    <th>ID</th>
    <th>Title</th>
    <th>Department</th>
    <th>Status</th>
    <th>View</th>
</tr>

{% for ticket in tickets %}
<tr>
    <td>{{ ticket.id }}</td>
    <td>{{ ticket.title }}</td>
    <td>{{ ticket.department }}</td>
    <td>{{ ticket.status }}</td>
    <td>
        {% if ticket.id %}
            <a href="{% url 'ticket_details' ticket.id %}">View</a>
        {% else %}
            N/A
        {% endif %}
    </td>
</tr>
{% empty %}
<tr>
    <td colspan="5">No tickets available</td>
</tr>
{% endfor %}
</table>

<br>
<a href="/logout/">Logout</a>
