{% extends "base.html" %}

{% block content %}
<h2>Admin Dashboard - New Tickets</h2>

<table border="1" cellpadding="8">
<tr>
    <th>ID</th>
    <th>Title</th>
    <th>Issue Type</th>
    <th>Raised By</th>
    <th>View</th>
</tr>

{% for ticket in tickets %}
<tr>
    <td>{{ ticket.id }}</td>
    <td>{{ ticket.title }}</td>
    <td>{{ ticket.issue_type }}</td>
    <td>{{ ticket.raised_by.username }}</td>
    <td>
        <a href="{% url 'ticket_details' ticket.id %}">View</a>
    </td>
</tr>
{% empty %}
<tr>
    <td colspan="5">No new tickets</td>
</tr>
{% endfor %}
</table>
{% endblock %}
