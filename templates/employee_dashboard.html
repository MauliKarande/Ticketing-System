{% extends "base.html" %}

{% block content %}
<h2>My Tickets</h2>

<table border="1" cellpadding="8">
<tr>
    <th>ID</th>
    <th>Title</th>
    <th>Status</th>
    <th>View</th>
</tr>

{% for ticket in tickets %}
<tr>
    <td>{{ ticket.id }}</td>
    <td>{{ ticket.title }}</td>
    <td>{{ ticket.status }}</td>
    <td>
        <a href="{% url 'ticket_details' ticket.id %}">View</a>
    </td>
</tr>
{% empty %}
<tr>
    <td colspan="4">No tickets raised</td>
</tr>
{% endfor %}
</table>
{% endblock %}
